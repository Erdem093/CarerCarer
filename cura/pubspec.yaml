name: cura
description: AI voice-first companion for unpaid elderly carers in the UK.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.6.3

  # HTTP Client
  dio: ^5.8.0+1

  # WebSocket
  web_socket_channel: ^3.0.2

  # Backend / Auth
  supabase_flutter: ^2.9.1

  # Audio Recording
  record: 5.1.2

  # Audio Playback
  just_audio: ^0.10.4
  audio_session: ^0.1.21

  # Real-time waveform visualization
  audio_waveforms: ^1.3.0

  # Lottie animations (orb states)
  lottie: ^3.3.1

  # Notifications
  firebase_core: ^3.13.0
  firebase_messaging: ^15.2.5
  flutter_local_notifications: ^18.0.1

  # Background tasks (scheduled calls)
  workmanager: ^0.5.2

  # Native Calendar (iOS EventKit / Android Calendar API)
  device_calendar: ^4.3.2

  # Image & Camera (letter explainer)
  image_picker: ^1.1.2
  camera: ^0.11.0

  # Utilities
  path_provider: ^2.1.5
  permission_handler: ^11.4.0
  url_launcher: ^6.3.1
  intl: ^0.20.2
  uuid: ^4.5.1
  shared_preferences: ^2.5.3
  flutter_secure_storage: ^9.2.4
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0
  logger: ^2.5.0
  flutter_dotenv: ^5.2.1

  # Charts (history screen)
  fl_chart: ^0.70.2

  # UI animations
  flutter_animate: ^4.5.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.14
  freezed: ^3.0.0
  json_serializable: ^6.9.4
  riverpod_generator: ^2.6.5

dependency_overrides:
  record_platform_interface: 1.1.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/animations/
    - assets/audio/sounds/
    - assets/images/
